# ---------------------------------------------------------------------------
# Bigboote CI — build, test, and verify on every push / PR
# ---------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -------------------------------------------------------------------------
  # Build + Unit tests (no containers needed)
  # -------------------------------------------------------------------------
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile all modules
        run: ./gradlew classes testClasses

      - name: Run unit tests (exclude Integration tag)
        run: ./gradlew test -Dkotest.tags='!Integration'

  # -------------------------------------------------------------------------
  # Integration tests (TestContainers spin up Docker containers)
  # -------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # TestContainers uses the Docker daemon on the runner directly.
      # GitHub-hosted Ubuntu runners come with Docker pre-installed.
      - name: Run integration tests
        run: ./gradlew test -Dkotest.tags='Integration'

  # -------------------------------------------------------------------------
  # Frontend (Vue 3 / Vite)
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vue-ui/package-lock.json

      - name: Install dependencies
        working-directory: vue-ui
        run: npm ci

      - name: Type-check & build
        working-directory: vue-ui
        run: npm run build

  # -------------------------------------------------------------------------
  # Fat JAR packaging (coordinator + agent-service)
  # -------------------------------------------------------------------------
  package:
    name: Package Fat JARs
    runs-on: ubuntu-latest
    needs: [build, integration]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow JARs
        run: ./gradlew :coordinator:shadowJar :agent-service:shadowJar

      - name: Upload coordinator JAR
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-jar
          path: coordinator/build/libs/coordinator.jar

      - name: Upload agent-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: agent-service-jar
          path: agent-service/build/libs/agent-service.jar
